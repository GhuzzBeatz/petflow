<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/util.js"></script>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">&#128101; Clientes</div>
    <div class="page-sub">Gerencie sua base de clientes</div>
  </div>

  <div class="form-card">
    <div class="form-card-title" id="formTitulo">Novo Cliente</div>

    <div class="form-row">
      <div class="form-group fg3">
        <label class="form-label">Nome *</label>
        <input id="nome" placeholder="Nome completo">
      </div>
      <div class="form-group fg2">
        <label class="form-label">Telefone</label>
        <input id="telefone" placeholder="(11) 99999-9999">
      </div>
      <div class="form-group fg1">
        <label class="form-label">CPF</label>
        <input id="cpf" placeholder="000.000.000-00">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group fg2">
        <label class="form-label">E-mail</label>
        <input id="email" type="email" placeholder="email@exemplo.com">
      </div>
      <div class="form-group fg1">
        <label class="form-label">Nascimento</label>
        <input id="dataNascimento" type="date">
      </div>
      <div class="form-group fg3">
        <label class="form-label">Endereco</label>
        <input id="endereco" placeholder="Rua, numero, bairro, cidade - UF">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">Observacoes</label>
        <input id="obs" placeholder="Alergias, preferencias, observacoes gerais...">
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn btn-primary" id="btnSalvar" onclick="salvarCliente()">+ Salvar Cliente</button>
      <button class="btn-cancel" id="btnCancelar" onclick="cancelar()">Cancelar</button>
    </div>

    <div class="aviso av-erro" id="avisoErro"></div>
    <div class="aviso av-ok" id="avisoOk"></div>
  </div>

  <div class="tbl-wrap">
    <div class="tbl-top">
      <span class="tbl-title">Clientes Cadastrados</span>
      <div class="tbl-actions">
        <input class="search-box" id="busca" placeholder="&#128269; Buscar por nome, telefone, CPF ou endereco" oninput="renderClientes()">
        <span class="tbl-count" id="count"></span>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Telefone</th>
          <th>CPF</th>
          <th>E-mail</th>
          <th>Nascimento</th>
          <th>Endereco</th>
          <th>Observacoes</th>
          <th style="text-align:center">Acoes</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8" class="empty">Nenhum cliente cadastrado.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="../js/clientes.js"></script>
</body>
</html>
