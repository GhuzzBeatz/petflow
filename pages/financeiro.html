<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/util.js"></script>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">&#128176; Financeiro</div>
    <div class="page-sub">Consolidado de atendimentos, pagamentos avulsos e estornos</div>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi-card">
      <div>
        <div class="kpi-label">Total Faturado</div>
        <div class="kpi-val sm" id="kpiTotal" style="color:var(--green)">R$ 0,00</div>
        <div class="kpi-sub" id="kpiTotalLabel">-</div>
      </div>
      <div class="kpi-icon ki-green">&#128181;</div>
    </div>

    <div class="kpi-card">
      <div>
        <div class="kpi-label">Faturamento do Mes</div>
        <div class="kpi-val sm" id="kpiMes" style="color:var(--primary)">R$ 0,00</div>
        <div class="kpi-sub" id="kpiMesLabel">-</div>
      </div>
      <div class="kpi-icon ki-blue">&#128198;</div>
    </div>

    <div class="kpi-card">
      <div>
        <div class="kpi-label">Ticket Medio</div>
        <div class="kpi-val sm" id="kpiTicket" style="color:var(--purple)">R$ 0,00</div>
        <div class="kpi-sub">por atendimento</div>
      </div>
      <div class="kpi-icon ki-purple">&#128202;</div>
    </div>
  </div>

  <div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap">
    <div class="form-group">
      <label class="form-label">Filtrar por mes</label>
      <input type="month" id="filtroMes" oninput="renderFinanceiro()">
    </div>
    <div class="form-group">
      <label class="form-label">Pagamento</label>
      <select id="filtroPagamento" onchange="renderFinanceiro()" style="width:160px">
        <option value="">Todos</option>
        <option value="Pix">Pix</option>
        <option value="Credito">Credito</option>
        <option value="Debito">Debito</option>
        <option value="Dinheiro">Dinheiro</option>
        <option value="A definir">A definir</option>
      </select>
    </div>
    <button class="btn btn-ghost" onclick="limparFiltro()">Ver Todos</button>
    <span style="margin-left:auto;font-size:12px;color:var(--muted);align-self:flex-end" id="count"></span>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Hora</th>
          <th>Cliente</th>
          <th>Animal</th>
          <th>Referencia</th>
          <th>Tipo</th>
          <th>Pagamento</th>
          <th style="text-align:right">Valor</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="8" class="empty">Nenhum movimento registrado.</td></tr></tbody>
    </table>
  </div>
</div>

<script src="../js/financeiro.js"></script>
</body>
</html>
