<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/licenca.js"></script>
  <script src="../js/theme.js"></script>
</head>
<body>
<div class="lic-body">
  <div class="lic-box">
    <div class="lic-logo">
      <div class="logo-icon" style="width:52px;height:52px;background:linear-gradient(135deg,#4f8ef7,#22d3a0);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 6px 20px rgba(79,142,247,0.4)">🐾</div>
      <div>
        <div style="font-size:26px;font-weight:900;color:var(--fg)">Pet<span style="color:var(--green)">Flow</span></div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">Ativação de Licença</div>
      </div>
    </div>

    <div class="lic-title">Insira sua Chave de Licença</div>
    <div class="lic-hint">
      Após a compra, a chave foi enviada via WhatsApp.<br>
      Formato: <span style="font-family:monospace;color:var(--primary);font-weight:700">PETFLOW-0000-0000-0000</span>
    </div>

    <input class="lic-input" id="inputChave" maxlength="23"
      placeholder="PETFLOW-XXXX-XXXX-XXXX"
      oninput="fmt(this)" onkeydown="if(event.key==='Enter')ativar()">

    <button class="lic-btn" onclick="ativar()">🔑 Ativar Licença</button>
    <div class="lic-erro" id="erro">Chave inválida. Verifique e tente novamente.</div>

    <div class="lic-foot">
      Suporte: <a href="#">WhatsApp (11) 94898-1459</a> · GHZPLUGIN@GMAIL.COM
    </div>
  </div>
</div>
<script>
function fmt(inp) {
  let v = inp.value.toUpperCase().replace(/[^A-Z0-9]/g,'')
  let r = ''
  if (v.length <= 7)       r = v
  else if (v.length <= 11) r = v.slice(0,7)+'-'+v.slice(7)
  else if (v.length <= 15) r = v.slice(0,7)+'-'+v.slice(7,11)+'-'+v.slice(11)
  else                     r = v.slice(0,7)+'-'+v.slice(7,11)+'-'+v.slice(11,15)+'-'+v.slice(15,19)
  inp.value = r
}
function ativar() {
  const chave = document.getElementById('inputChave').value.trim()
  const erro  = document.getElementById('erro')
  if (validarChavePF(chave)) {
    salvarLicencaPF(chave)
    window.location.href = '../index.html'
  } else {
    erro.style.display = 'block'
    document.getElementById('inputChave').style.borderColor = 'var(--red)'
    setTimeout(() => { erro.style.display='none'; document.getElementById('inputChave').style.borderColor='' }, 4000)
  }
}
</script>
</body>
</html>
