<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GHZ Plugin — Gerador PetFlow</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d0d;color:#F2F2F2;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:16px}
  .wrap{max-width:560px;margin:0 auto}
  .header{display:flex;align-items:center;gap:12px;padding:20px 0 16px}
  .logo{width:44px;height:44px;background:linear-gradient(135deg,#4f8ef7,#22d3a0);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(79,142,247,.4);flex-shrink:0}
  .brand{font-size:20px;font-weight:800;color:#F2F2F2}.brand span{color:#22d3a0}
  .sub{font-size:12px;color:#555;margin-top:2px}
  .tabs{display:flex;gap:6px;margin-bottom:20px;background:#1A1A1A;padding:6px;border-radius:12px;border:1px solid #2A2A2A}
  .tab{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;background:transparent;color:#666}
  .tab.active{background:#22d3a0;color:#0d0d0d;box-shadow:0 2px 8px rgba(34,211,160,.3)}
  .page{display:none}.page.active{display:block}
  .card{background:#1A1A1A;border:1px solid #2A2A2A;border-radius:14px;padding:20px;margin-bottom:14px}
  label{font-size:10px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:7px}
  input{width:100%;background:#111;border:1px solid #333;border-radius:10px;padding:13px 16px;color:#F2F2F2;font-size:15px;outline:none;transition:border-color .2s}
  input:focus{border-color:#22d3a0}
  .btn-main{width:100%;padding:14px;background:#22d3a0;border:none;border-radius:10px;color:#0d0d0d;font-size:15px;font-weight:800;cursor:pointer;transition:background .2s;margin-top:12px}
  .btn-main:hover{background:#1ab88a}
  .key-card{background:#111;border:1.5px solid #22d3a0;border-radius:12px;padding:20px;text-align:center;margin-top:14px;display:none}
  .key-label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
  .key-value{font-family:monospace;font-size:20px;font-weight:800;color:#22d3a0;letter-spacing:.12em;word-break:break-all}
  .key-name{font-size:12px;color:#666;margin-top:8px}
  .btn-copy{background:#22d3a0;border:none;border-radius:8px;color:#0d0d0d;padding:11px 24px;cursor:pointer;font-size:13px;font-weight:700;margin-top:14px;transition:background .2s;width:100%}
  .btn-copy:hover{background:#1ab88a}
  .list-empty{color:#555;font-size:13px;padding:24px;text-align:center;background:#1A1A1A;border-radius:10px;border:1px solid #2A2A2A}
  .list-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:10px;margin-bottom:8px}
  .list-item:hover{border-color:#383838}
  .item-key{font-family:monospace;color:#22d3a0;font-weight:700;font-size:12px;letter-spacing:.06em;white-space:nowrap}
  .item-info{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden}
  .item-name{color:#A1A1A1;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item-date{color:#555;font-size:11px}
  .btn-del{background:none;border:none;color:#444;cursor:pointer;font-size:14px;padding:6px 8px;border-radius:6px;flex-shrink:0;transition:all .2s}
  .btn-del:hover{color:#E0142D;background:rgba(224,20,45,.1)}
  .btn-cp{background:none;border:1px solid #2A2A2A;border-radius:6px;color:#22d3a0;cursor:pointer;font-size:11px;font-weight:700;padding:4px 10px;white-space:nowrap;transition:all .2s}
  .btn-cp:hover{border-color:#22d3a0;background:rgba(34,211,160,.1)}
  .badge{display:inline-flex;align-items:center;justify-content:center;background:#22d3a0;color:#0d0d0d;border-radius:99px;font-size:10px;font-weight:800;padding:2px 7px;margin-left:6px}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .stat{background:#1A1A1A;border:1px solid #2A2A2A;border-radius:10px;padding:14px;text-align:center}
  .stat-val{font-size:24px;font-weight:800;color:#22d3a0}
  .stat-lbl{font-size:11px;color:#555;margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .footer{text-align:center;font-size:11px;color:#333;padding:20px 0 8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">🐾</div>
    <div>
      <div class="brand">Pet<span>Flow</span></div>
      <div class="sub">Gerador de Licenças — GHZ Plugin</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="aba('gerar')">⚡ Gerar Chave</button>
    <button class="tab" onclick="aba('lista')" id="tabLista">📋 Chaves Geradas</button>
  </div>

  <div id="page-gerar" class="page active">
    <div class="card">
      <label>Nome do Cliente</label>
      <input id="nomeCliente" placeholder="Ex: PetShop do João" onkeydown="if(event.key==='Enter')gerar()"/>
      <button class="btn-main" onclick="gerar()">⚡ Gerar Nova Chave</button>
    </div>
    <div class="key-card" id="resultado">
      <div class="key-label">Chave de Licença Gerada</div>
      <div class="key-value" id="chaveGerada"></div>
      <div class="key-name" id="nomeExibido"></div>
      <button class="btn-copy" onclick="copiarMsg()">📋 Copiar Mensagem para WhatsApp</button>
    </div>
  </div>

  <div id="page-lista" class="page">
    <div class="stats">
      <div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Licenças Geradas</div></div>
      <div class="stat"><div class="stat-val" id="statMes">0</div><div class="stat-lbl">Este Mês</div></div>
    </div>
    <div class="card" style="padding:14px">
      <input id="busca" placeholder="🔍 Buscar por nome ou chave..." oninput="renderLista()" style="margin:0"/>
    </div>
    <div id="listaChaves"></div>
  </div>

  <div class="footer">GHZ Plugin © 2026 — Use apenas para clientes que adquiriram o PetFlow</div>
</div>

<script>
const SALT   = 'GHZ2026PETFLOW'
const PREFIX = 'PETFLOW'
const LS_KEY = 'ghz_petflow_licencas'

function gerarChave(n) {
  const p1 = String(n).padStart(4,'0')
  const p2 = btoa(n + SALT).replace(/[^A-Z0-9]/gi,'').slice(0,4).toUpperCase()
  const p3 = String((n*17)%9999).padStart(4,'0')
  return `${PREFIX}-${p1}-${p2}-${p3}`
}

function aba(id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.querySelectorAll('.tab')[id==='gerar'?0:1].classList.add('active')
  document.getElementById('page-'+id).classList.add('active')
  if (id==='lista') renderLista()
}

function gerar() {
  const nome  = document.getElementById('nomeCliente').value.trim() || 'Cliente'
  const n     = Math.floor(1000 + Math.random()*8999)
  const chave = gerarChave(n)
  document.getElementById('chaveGerada').textContent = chave
  document.getElementById('nomeExibido').textContent = 'Cliente: '+nome
  document.getElementById('resultado').style.display = 'block'
  const lista = JSON.parse(localStorage.getItem(LS_KEY)||'[]')
  lista.unshift({ chave, nome, data: new Date().toLocaleDateString('pt-BR'), ts: Date.now() })
  localStorage.setItem(LS_KEY, JSON.stringify(lista))
  badge()
}

function copiarMsg() {
  const chave = document.getElementById('chaveGerada').textContent
  const nome  = document.getElementById('nomeCliente').value.trim() || 'cliente'
  const msg =
`Olá, ${nome}! 👋

Obrigado por adquirir o *PetFlow*! 🐾🐶

Segue abaixo a chave da sua licença:

🔑 *${chave}*

📥 *Link para download do app:*
[COLE AQUI O LINK DO DRIVE DO PETFLOW]

*Como ativar:*
1. Baixe e instale o PetFlow pelo link acima
2. Abra o app
3. Digite a chave acima e clique em "Ativar Licença"
4. Pronto! ✅

Qualquer dúvida, estou à disposição.
*GHZ Plugin* — (11) 94898-1459`

  navigator.clipboard.writeText(msg).then(()=>{
    const btn = document.querySelector('.btn-copy')
    const orig = btn.textContent
    btn.textContent = '✓ Copiado! Cole no WhatsApp'
    btn.style.background = '#0ba87a'
    setTimeout(()=>{ btn.textContent=orig; btn.style.background='' }, 3000)
  })
}

function copiarChave(chave) {
  navigator.clipboard.writeText(chave).then(()=>{
    document.querySelectorAll('.btn-cp').forEach(el=>{
      if(el.dataset.chave===chave){ el.textContent='✓'; setTimeout(()=>el.textContent='Copiar',1500) }
    })
  })
}

function deletar(chave) {
  if(!confirm('Remover esta chave do histórico?')) return
  let lista = JSON.parse(localStorage.getItem(LS_KEY)||'[]').filter(x=>x.chave!==chave)
  localStorage.setItem(LS_KEY,JSON.stringify(lista))
  renderLista(); badge()
}

function badge() {
  const lista = JSON.parse(localStorage.getItem(LS_KEY)||'[]')
  const el    = document.getElementById('tabLista')
  el.innerHTML = `📋 Chaves Geradas${lista.length>0?`<span class="badge">${lista.length}</span>`:''}`
}

function renderLista() {
  const busca = (document.getElementById('busca')?.value||'').toLowerCase()
  let lista   = JSON.parse(localStorage.getItem(LS_KEY)||'[]')
  const total = lista.length
  const hoje  = new Date()
  const mes   = lista.filter(x=>{ const p=x.data.split('/'); return +p[1]===hoje.getMonth()+1&&+p[2]===hoje.getFullYear() }).length
  document.getElementById('statTotal').textContent = total
  document.getElementById('statMes').textContent   = mes
  if(busca) lista = lista.filter(x=>x.nome.toLowerCase().includes(busca)||x.chave.toLowerCase().includes(busca))
  const el = document.getElementById('listaChaves')
  if(!lista.length){ el.innerHTML=`<div class="list-empty">${total===0?'Nenhuma chave gerada ainda.':'Nenhum resultado.'}</div>`; return }
  el.innerHTML = lista.map(item=>`
    <div class="list-item">
      <div class="item-info">
        <span class="item-key">${item.chave}</span>
        <span class="item-name">${item.nome}</span>
        <span class="item-date">📅 ${item.data}</span>
      </div>
      <button class="btn-cp" data-chave="${item.chave}" onclick="copiarChave('${item.chave}')">Copiar</button>
      <button class="btn-del" onclick="deletar('${item.chave}')" title="Remover">✕</button>
    </div>`).join('')
}

badge(); renderLista()
</script>
</body>
</html>
